<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Không tồn tại</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:#f4f7fa;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* METEOR RAIN */
.meteor{
    position:absolute;
    width:2px;
    height:80px;
    background:linear-gradient(transparent,#ff00ff,#7a00ff);
    opacity:0.7;
    transform:rotate(45deg);
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-200px) translateX(0) rotate(45deg);opacity:1}
    100%{transform:translateY(120vh) translateX(-200px) rotate(45deg);opacity:0}
}

.m1{left:10%;animation-duration:3s;animation-delay:0s}
.m2{left:30%;animation-duration:4s;animation-delay:1s}
.m3{left:55%;animation-duration:3.5s;animation-delay:2s}
.m4{left:75%;animation-duration:5s;animation-delay:0.5s}
.m5{left:90%;animation-duration:4.5s;animation-delay:1.5s}

/* CARD */
.container-404{
    background:#fff;
    padding:60px 50px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.08);
    max-width:600px;
    width:92%;
    position:relative;
    z-index:2;
}

.container-404::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:30px;
    padding:2px;
    background:linear-gradient(45deg,#ff00ff,#7a00ff);
    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
}

/* FLOAT */
@keyframes float{
    from{transform:translateY(-10px)}
    to{transform:translateY(15px)}
}

/* STICKERS */
.sticker{
    position:absolute;
    width:60px;
    animation:float 4s ease-in-out infinite alternate;
}

.s1{top:-25px;left:-25px}
.s2{top:-25px;right:-25px}
.s3{bottom:-25px;left:-25px}
.s4{bottom:-25px;right:-25px}

/* ASTRONAUT */
.astronaut{
    width:150px;
    margin-bottom:15px;
    animation:float 3s ease-in-out infinite alternate;
}

/* TEXT */
.title-404{
    font-size:100px;
    font-weight:900;
    background:linear-gradient(45deg,#ff00ff,#7a00ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 25px rgba(255,0,255,0.4);
}

.subtitle{
    font-size:18px;
    margin:15px 0 35px;
    color:#666;
}

/* BUTTON */
.home-btn{
    display:inline-block;
    padding:14px 45px;
    border-radius:50px;
    font-weight:700;
    text-decoration:none;
    background:linear-gradient(45deg,#ff00ff,#7a00ff);
    color:#fff;
    box-shadow:0 10px 25px rgba(122,0,255,0.3);
    transition:0.3s;
}

.home-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 35px rgba(122,0,255,0.5);
}

@media(max-width:576px){
    .title-404{font-size:70px}
    .astronaut{width:110px}
}
</style>
</head>

<body>

<!-- Meteor Rain -->
<div class="meteor m1"></div>
<div class="meteor m2"></div>
<div class="meteor m3"></div>
<div class="meteor m4"></div>
<div class="meteor m5"></div>

<div class="container-404">

    <img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png" class="sticker s1">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616490.png" class="sticker s2">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616494.png" class="sticker s3">
    <img src="https://cdn-icons-png.flaticon.com/512/2909/2909760.png" class="sticker s4">

    <img class="astronaut"
    src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">

    <div class="title-404">404</div>

    <div class="subtitle">
        Trang bạn truy cập không tồn tại.<br>
        Hãy quay về MegaHub 🚀
    </div>

    <!-- QUAN TRỌNG -->
    <a href="/index.html" class="home-btn">
        Trở về Trang Chủ
    </a>

</div>

</body>
</html>
