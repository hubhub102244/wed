<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Không tìm thấy trang</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at center, #0f2027, #203a43, #0f2027);
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}

.neon-box{
    text-align:center;
    padding:50px 40px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    box-shadow:0 0 40px rgba(0,98,255,0.3);
}

.neon-title{
    font-size:90px;
    font-weight:900;
    color:#00c3ff;
    text-shadow:
        0 0 5px #00c3ff,
        0 0 15px #00c3ff,
        0 0 30px #00c3ff,
        0 0 60px #0072ff;
    margin-bottom:10px;
}

.neon-text{
    font-size:20px;
    color:#ffffff;
    margin-bottom:30px;
}

.neon-btn{
    padding:12px 35px;
    font-size:16px;
    font-weight:700;
    border-radius:50px;
    border:none;
    color:#fff;
    background:linear-gradient(45deg,#00c3ff,#0072ff);
    box-shadow:0 0 15px rgba(0,195,255,0.6);
    transition:0.3s;
}

.neon-btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 30px rgba(0,195,255,1);
}

@media(max-width:576px){
    .neon-title{font-size:60px;}
    .neon-text{font-size:16px;}
}
</style>
</head>

<body>

<div class="neon-box">
    <div class="neon-title">404</div>
    <div class="neon-text">
        Trang bạn truy cập không tồn tại 🚫<br>
        Vui lòng kiểm tra lại đường dẫn.
    </div>
    <a href="/" class="neon-btn">
        ⬅ Trở về Trang Chủ
    </a>
</div>

</body>
</html>
