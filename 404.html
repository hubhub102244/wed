<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Không tồn tại</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:#f4f7fa;
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

/* ===== METEOR ===== */
.meteor{
    position:absolute;
    top:-120px;
    width:2px;
    height:120px;
    background:linear-gradient(to bottom,#ff4fd8,#9b5cff,transparent);
    opacity:.6;
    animation:meteorFall linear infinite;
}

@keyframes meteorFall{
    0%{transform:translateY(0)}
    100%{transform:translateY(120vh)}
}

/* ===== STARS ===== */
.star{
    position:absolute;
    width:4px;
    height:4px;
    background:#d36bff;
    border-radius:50%;
    box-shadow:0 0 12px #d36bff;
    animation:blink 2s infinite alternate;
}

@keyframes blink{
    from{opacity:.2}
    to{opacity:1}
}

/* ===== PLANETS ===== */
.planet{
    position:absolute;
    animation:
        floatPlanet 6s infinite alternate ease-in-out,
        rotatePlanet 40s linear infinite;
    opacity:.95;
}

@keyframes floatPlanet{
    from{transform:translateY(-15px)}
    to{transform:translateY(20px)}
}

@keyframes rotatePlanet{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

/* ===== CARD ===== */
.container-404{
    background:#fff;
    padding:50px 40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.08);
    width:90%;
    max-width:520px;
    position:relative;
    z-index:10;
}

.container-404::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:25px;
    padding:2px;
    background:linear-gradient(45deg,#ff4fd8,#9b5cff);
    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
}

/* TEXT */
.title-404{
    font-size:90px;
    font-weight:900;
    background:linear-gradient(45deg,#ff4fd8,#9b5cff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    font-size:16px;
    margin:15px 0 35px;
    color:#666;
}

.astronaut{
    width:130px;
    margin-bottom:15px;
    animation:floatPlanet 3s infinite alternate ease-in-out;
}

/* ===== BUTTON NEON ===== */
.home-btn{
    display:inline-block;
    padding:16px 48px;
    border-radius:60px;
    font-weight:700;
    text-decoration:none;
    font-size:16px;
    letter-spacing:1px;
    background:linear-gradient(45deg,#ff4fd8,#9b5cff);
    color:#fff;
    position:relative;
    overflow:hidden;
    box-shadow:
        0 0 15px #ff4fd8,
        0 0 35px #9b5cff,
        0 0 70px rgba(155,92,255,.6);
    animation:pulseGlow 2s infinite;
    transition:.4s ease;
}

@keyframes pulseGlow{
    0%{box-shadow:0 0 15px #ff4fd8,0 0 35px #9b5cff}
    50%{box-shadow:0 0 30px #ff4fd8,0 0 70px #9b5cff}
    100%{box-shadow:0 0 15px #ff4fd8,0 0 35px #9b5cff}
}

/* ánh sáng quét */
.home-btn::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.6),transparent);
    transition:.6s;
}

.home-btn:hover::after{
    left:100%;
}

.home-btn:hover{
    transform:scale(1.12);
}

/* viền chạy */
.home-btn::before{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:60px;
    background:linear-gradient(90deg,#ff4fd8,#9b5cff,#ff4fd8);
    background-size:400%;
    animation:borderMove 4s linear infinite;
    z-index:-1;
}

@keyframes borderMove{
    0%{background-position:0%}
    100%{background-position:400%}
}

@media(max-width:480px){
    .title-404{font-size:60px}
    .astronaut{width:100px}
}
</style>
</head>

<body>

<!-- Meteors -->
<script>
for(let i=0;i<18;i++){
    let m=document.createElement("div");
    m.className="meteor";
    m.style.left=Math.random()*100+"%";
    m.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(m);
}
</script>

<!-- Stars -->
<script>
for(let i=0;i<80;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    s.style.width=(2+Math.random()*4)+"px";
    s.style.height=s.style.width;
    s.style.animationDuration=(1+Math.random()*2)+"s";
    document.body.appendChild(s);
}
</script>

<!-- PLANETS -->
<img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png" class="planet" style="top:8%;left:5%;width:80px;">
<img src="https://cdn-icons-png.flaticon.com/512/616/616490.png" class="planet" style="bottom:10%;right:5%;width:90px;">
<img src="https://cdn-icons-png.flaticon.com/512/616/616494.png" class="planet" style="top:70%;left:10%;width:70px;">
<img src="https://cdn-icons-png.flaticon.com/512/2909/2909760.png" class="planet" style="top:15%;right:10%;width:75px;">
<img src="https://cdn-icons-png.flaticon.com/512/2909/2909749.png" class="planet" style="bottom:20%;left:40%;width:60px;">
<img src="https://cdn-icons-png.flaticon.com/512/2909/2909735.png" class="planet" style="top:35%;right:35%;width:65px;">
<img src="https://cdn-icons-png.flaticon.com/512/2909/2909730.png" class="planet" style="top:20%;left:25%;width:55px;">
<img src="https://cdn-icons-png.flaticon.com/512/2909/2909727.png" class="planet" style="bottom:25%;right:25%;width:65px;">
<img src="https://cdn-icons-png.flaticon.com/512/2909/2909753.png" class="planet" style="top:50%;left:70%;width:50px;">
<img src="https://cdn-icons-png.flaticon.com/512/2909/2909750.png" class="planet" style="top:75%;right:15%;width:45px;">
<img src="https://cdn-icons-png.flaticon.com/512/2909/2909743.png" class="planet" style="bottom:10%;left:60%;width:70px;">

<!-- CARD -->
<div class="container-404">
    <img class="astronaut"
         src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">
    <div class="title-404">404</div>
    <div class="subtitle">
        Trang bạn truy cập không tồn tại.<br>
        Hãy quay về MegaHub 🚀
    </div>
    <a href="/index.html" class="home-btn">
        🚀 Trở về MegaHub
    </a>
</div>

</body>
</html>
