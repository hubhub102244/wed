<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Không tồn tại</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*
{
margin:0;
padding:0;
box-sizing:border-box;
}
html
{
height:100%;
overflow:hidden;
}

body
{
height:100%;
background:#f4f7fa;
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}
.effects
{
position:fixed;
inset:0;
overflow:hidden;
z-index:0;
}
.meteor
{
position:absolute;
top:-150px;
width:2px;
height:120px;
background:linear-gradient(to bottom,#ff4fd8,#9b5cff,transparent);
opacity:.6;
animation:meteorFall linear infinite;
}
@keyframes meteorFall
{
0%
{
transform:translateY(-150px);
}
100%
{
transform:translateY(110vh);
}
}
.star
{
position:absolute;
width:4px;
height:4px;
background:#d36bff;
border-radius:50%;
box-shadow:0 0 12px #d36bff;
animation:blink 2s infinite alternate;
}
@keyframes blink
{
from{opacity:.2}
to{opacity:1}
}
.planet-center
{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:280px;
opacity:.06;
animation:rotatePlanet 120s linear infinite;
z-index:0;
}
@keyframes rotatePlanet
{
from{transform:translate(-50%,-50%) rotate(0deg)}
to{transform:translate(-50%,-50%) rotate(360deg)}
}
.container-404
{
background:#ffffff;
padding:40px 25px;
border-radius:28px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.08);
width:92%;
max-width:480px;
position:relative;
z-index:10;
}
.container-404::before
{
content:"";
position:absolute;
inset:0;
border-radius:28px;
padding:2px;
background:linear-gradient(45deg,#ff4fd8,#9b5cff);
-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
}
.title-404
{
position:relative;
font-size:90px;
font-weight:900;
background:linear-gradient(45deg,#ff4fd8,#9b5cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
z-index:2;
}
.title-404::before
{
content:"404";
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:90px;
font-weight:900;
color:#000;
opacity:.08;
filter:blur(8px);
z-index:-1;
}
.subtitle
{
font-size:16px;
margin:15px 0 35px;
color:#666;
}
.astronaut
{
width:120px;
margin-bottom:15px;
animation:floatUp 3s infinite alternate ease-in-out;
}

@keyframes floatUp
{
from{transform:translateY(-10px)}
to{transform:translateY(15px)}
}
.home-btn
{
display:inline-block;
padding:16px 48px;
border-radius:60px;
font-weight:700;
text-decoration:none;
font-size:16px;
letter-spacing:1px;
background:linear-gradient(45deg,#ff4fd8,#9b5cff);
color:#fff;
position:relative;
overflow:hidden;
box-shadow:
0 0 15px #ff4fd8,
0 0 35px #9b5cff,
0 0 70px rgba(155,92,255,.6);
animation:pulseGlow 2s infinite;
transition:.4s ease;
}
@keyframes pulseGlow
{
0%{box-shadow:0 0 15px #ff4fd8,0 0 35px #9b5cff}
50%{box-shadow:0 0 30px #ff4fd8,0 0 70px #9b5cff}
100%{box-shadow:0 0 15px #ff4fd8,0 0 35px #9b5cff}
}
.home-btn::after
{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.6),transparent);
transition:.6s;
}
.home-btn:hover::after
{
left:100%;
}
.home-btn:hover
{
transform:scale(1.05);
}
@media(max-width:480px)
{
.title-404
{
font-size:60px;
}
.astronaut
{
width:95px;
}
}
</style>
</head>
<body>
<div class="effects"></div>
<img src="https://cdn-icons-png.flaticon.com/512/2909/2909760.png"
class="planet-center">
<script>
for(let i=0;i<18;i++)
{
let m=document.createElement("div");
m.className="meteor";
m.style.left=Math.random()*100+"%";
m.style.animationDuration=(3+Math.random()*3)+"s";
document.querySelector(".effects").appendChild(m);
}
</script>
<script>
for(let i=0;i<80;i++)
{
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
s.style.width=(2+Math.random()*4)+"px";
s.style.height=s.style.width;
s.style.animationDuration=(1+Math.random()*2)+"s";
document.querySelector(".effects").appendChild(s);
}
</script>
<div class="container-404">
<img class="astronaut"
src="https://cdn-icons-png.flaticon.com/512/6840/6840476.png">
<div class="title-404">404</div>
<div class="subtitle">
Trang bạn truy cập không tồn tại.<br>
Hãy quay về MegaHub 🚀
</div>
<a href="/" class="home-btn">
🚀 Trở về MegaHub
</a>
</div>
</body>
</html>
